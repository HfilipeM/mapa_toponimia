<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
    <title>Mapa Estafeta Pro</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/fuse.js@6.6.2"></script>
    <style>
        *, *::before, *::after { box-sizing: border-box; }
        body { margin: 0; padding: 0; font-family: sans-serif; }
        #map { height: 100vh; width: 100vw; }

        /* ── Popup ───────────────────────────────── */
        .btn-copiar {
            background: none;
            border: none;
            color: #1a73e8;
            text-decoration: underline;
            cursor: pointer;
            font-size: 14px;
            padding: 12px 10px;
            display: block;
            width: 100%;
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
        }
        .btn-copiar:active { background-color: #f0f0f0; }

        /* ── Search ──────────────────────────────── */
        .search-container {
            position: absolute; top: 15px; left: 15px;
            z-index: 1100; display: flex; align-items: flex-start;
        }
        #search-button {
            position: relative; flex-shrink: 0;
            width: 50px; height: 50px; border-radius: 50%; border: none;
            background: white; display: flex; align-items: center; justify-content: center;
            font-size: 18px; color: #333;
            box-shadow: 0 2px 10px rgba(0,0,0,.2); cursor: pointer;
            touch-action: manipulation; -webkit-tap-highlight-color: transparent;
            transition: box-shadow .2s;
        }
        #search-button::after {
            content: ''; position: absolute; top: 7px; right: 7px;
            width: 9px; height: 9px; border-radius: 50%;
            background: #1a73e8; border: 2px solid white;
            opacity: 0; transform: scale(.5);
            transition: opacity .2s, transform .2s; pointer-events: none;
        }
        #search-button.has-active-search { box-shadow: 0 2px 10px rgba(26,115,232,.35); }
        #search-button.has-active-search::after { opacity: 1; transform: scale(1); }

        .search-box {
            display: none; align-items: center; background: white;
            height: 50px; border-radius: 10px;
            box-shadow: 0 2px 10px rgba(0,0,0,.2); overflow: hidden;
            max-width: calc(100vw - 30px);
        }
        .search-container.expanded .search-box   { display: flex; }
        .search-container.expanded #search-button { display: none; }

        #search {
            border: none; outline: none; font-size: 16px;
            padding: 0 12px; flex: 1; height: 100%; min-width: 0;
        }
        #clear-search {
            flex-shrink: 0; width: 40px; height: 100%;
            display: none; align-items: center; justify-content: center;
            font-size: 25px; color: #000; cursor: pointer;
            touch-action: manipulation; -webkit-tap-highlight-color: transparent;
        }
        #clear-search.visible { display: flex; }

        #suggestions {
            position: absolute; top: 55px; left: 0;
            width: min(320px, calc(100vw - 30px));
            background: white; border-radius: 12px;
            max-height: min(280px, 40vh);
            overflow-y: auto; -webkit-overflow-scrolling: touch;
            box-shadow: 0 4px 16px rgba(0,0,0,.15);
            display: none;
        }
        #suggestions.visible { display: block; }

        .suggestion-item {
            display: flex; align-items: flex-start; gap: 10px;
            padding: 12px 14px; border-bottom: 1px solid #f0f0f0;
            cursor: pointer; touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
        }
        .suggestion-item:last-child { border-bottom: none; }
        .suggestion-item:active { background: #f5f5f5; }
        .suggestion-icon { flex-shrink: 0; margin-top: 1px; color: #999; font-size: 13px; }
        .suggestion-text { flex: 1; min-width: 0; }
        .suggestion-name {
            font-size: 14px; color: #222;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }
        .suggestion-name mark {
            background: #fef3aa; color: #222; border-radius: 2px; padding: 0 1px;
        }

        /* ── Layer toggle ────────────────────────── */
        #layer-toggle-btn {
            position: absolute; top: 15px; right: 15px; z-index: 1100;
            width: 50px; height: 50px; border-radius: 50%; border: none;
            background: white; display: flex; align-items: center; justify-content: center;
            font-size: 18px; color: #333;
            box-shadow: 0 2px 10px rgba(0,0,0,.2); cursor: pointer;
            touch-action: manipulation; -webkit-tap-highlight-color: transparent;
        }
        #layer-panel {
            position: absolute; top: 72px; right: 15px; z-index: 1100;
            background: white; border-radius: 12px;
            box-shadow: 0 4px 16px rgba(0,0,0,.18);
            width: min(200px, calc(100vw - 30px));
            padding: 8px 0; display: none;
        }
        #layer-panel.visible { display: block; }
        .layer-panel-title {
            font-size: 11px; font-weight: 700; letter-spacing: .08em;
            text-transform: uppercase; color: #888; padding: 6px 16px 4px;
        }
        .layer-row {
            display: flex; align-items: center; padding: 11px 16px; gap: 12px;
            cursor: pointer; touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
        }
        .layer-row:active { background: #f5f5f5; }
        .layer-radio {
            width: 18px; height: 18px; border-radius: 50%; flex-shrink: 0;
            border: 2px solid #ccc; display: flex; align-items: center;
            justify-content: center; transition: border-color .15s;
        }
        .layer-radio.checked { border-color: #1a73e8; }
        .layer-radio.checked::after {
            content: ''; width: 9px; height: 9px; border-radius: 50%; background: #1a73e8;
        }
        .layer-check {
            width: 18px; height: 18px; border-radius: 4px; flex-shrink: 0;
            border: 2px solid #ccc; display: flex; align-items: center;
            justify-content: center; transition: border-color .15s, background .15s;
        }
        .layer-check.checked { border-color: #1a73e8; background: #1a73e8; }
        .layer-check.checked::after { content: '✓'; color: white; font-size: 12px; line-height: 1; }
        .layer-label { font-size: 15px; color: #222; }
        .layer-divider { height: 1px; background: #eee; margin: 6px 0; }

        /* ── Toast ───────────────────────────────── */
        #toast-copiado {
            position: fixed; top: 30px; left: 50%; transform: translateX(-50%);
            background: rgba(255, 255, 255, 0.60); color: black;
            padding: 10px 20px; border-radius: 20px; font-size: 14px;
            pointer-events: none; display: none; z-index: 9999;
            white-space: nowrap; max-width: calc(100vw - 32px);
        }
    </style>
</head>
<body>

<div id="toast-copiado"></div>

<!-- Search -->
<div class="search-container">
    <button id="search-button" aria-label="Pesquisar rua">
        <i class="fas fa-search"></i>
    </button>
    <div class="search-box">
        <input id="search" type="text" placeholder="Pesquisar rua..."
               autocomplete="off" autocorrect="off" spellcheck="false">
        <span id="clear-search" role="button" aria-label="Limpar">&times;</span>
    </div>
    <div id="suggestions" role="listbox"></div>
</div>

<!-- Layer toggle -->
<button id="layer-toggle-btn" aria-label="Camadas">
    <i class="fas fa-layer-group"></i>
</button>
<div id="layer-panel" role="menu">
    <div class="layer-panel-title">Mapa base</div>
    <div class="layer-row" id="lr-osm">
        <div class="layer-radio" id="radio-osm"></div>
        <span class="layer-label">Predefenição</span>
    </div>
    <div class="layer-row" id="lr-sat">
        <div class="layer-radio checked" id="radio-sat"></div>
        <span class="layer-label">Satélite</span>
    </div>
    <div class="layer-divider"></div>
    <div class="layer-panel-title">Camadas</div>
    <div class="layer-row" id="lr-ruas">
        <div class="layer-check checked" id="check-ruas"></div>
        <span class="layer-label">Toponímias</span>
    </div>
</div>

<div id="map"></div>
<script src="js/app.js"></script>
</body>
</html>
