<!DOCTYPE html>
<html lang="pt">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Mapa Estafeta Pro</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/fuse.js@6.6.2"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
        }

        #map {
            height: 100vh;
            width: 100vw;
        }

        /* container principal */

.search-container{
    position:absolute;
    top:15px;
    left:15px;

    z-index:1100;

    display:flex;
    align-items:center;
}

/* lupa */

#search-button{
    width:50px;
    height:50px;

    border-radius:50%;
    border:none;

    background:white;

    display:flex;
    align-items:center;
    justify-content:center;

    font-size:18px;

    box-shadow:0 2px 10px rgba(0,0,0,.2);

    cursor:pointer;
}

/* caixa input + X */

.search-box{

    display:none;

    align-items:center;

    background:white;

    height:50px;

    border-radius:10px;

    box-shadow:0 2px 10px rgba(0,0,0,.2);

    overflow:hidden;
}

/* quando expandido */

.search-container.expanded .search-box{
    display:flex;
}

/* esconder lupa quando aberto */

.search-container.expanded #search-button{
    display:none;
}

/* input */

#search{

    border:none;
    outline:none;

    font-size:16px;

    padding:0 15px;

    width:210px;

    height:100%;
}

/* clear */

#clear-search{

    width:40px;
    height:100%;
    display:flex;
    align-items:center;
    justify-content:center;

    font-size:25px;

    color:#000000;

    cursor:pointer;

    display:none;
}

/* aparece quando tem texto */

#clear-search.visible{
    display:flex;
}

/* sugestões */

#suggestions{

    position:absolute;

    top:55px;
    left:0;

    width:280px;

    background:white;

    border-radius:10px;

    max-height:200px;
    overflow-y:auto;

    box-shadow:0 4px 10px rgba(0,0,0,.15);

    display:none;
}

#suggestions.visible{
    display:block;
}

        .suggestion-item {
            padding: 12px 15px;
            border-bottom: 1px solid #eee;
            cursor: pointer;
        }

        .suggestion-item:hover {
            background: #f5f5f5;
        }

        .suggestion-item:last-child {
            border-bottom: none;
        }

        .btn-copiar {
            background: none;
            border: none;
            color: #1a73e8;
            text-decoration: underline;
            cursor: pointer;
            font-size: 14px;
            padding: 12px 10px;
            display: block;
            width: 100%;
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
        }

        .btn-copiar:hover {
            color: #0d47a1;
        }

        .btn-copiar:active {
            background-color: #f0f0f0;
        }

        /* Toast */
        #toast-copiado {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background-color: rgba(255, 255, 255, 0.6);
            color: black;
            padding: 10px 20px;
            border-radius: 20px;
            font-family: sans-serif;
            pointer-events: none;
            display: none;
            z-index: 9999;
            transition: opacity 0.5s;
        }
    </style>
</head>

<body>
    <div id="toast-copiado">Copiado!</div>

    <div class="search-container">

    <button id="search-button">
        <i class="fas fa-search"></i>
    </button>

    <div class="search-box">
        <input id="search" placeholder="Pesquisar..." autocomplete="off">
        <span id="clear-search">&times;</span>
    </div>

    <div id="suggestions"></div>

</div>

    <div id="map"></div>

    <script src="js/app.js"></script>
</body>

</html>
